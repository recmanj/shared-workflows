name: Publish Helm Chart (OCI)

on:
  workflow_call:
    inputs:
      chart_path:
        required: true
        type: string
        description: Path to chart directory (e.g., charts/demo-backend)
      registry:
        required: false
        type: string
        default: ghcr.io

jobs:
  helm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${INPUTS_REGISTRY} -u ${GITHUB_ACTOR} --password-stdin
        env:
          INPUTS_REGISTRY: ${{ inputs.registry }}

      - name: Package chart
        run: helm package ${INPUTS_CHART_PATH}
        env:
          INPUTS_CHART_PATH: ${{ inputs.chart_path }}

      - name: Push chart
        run: |
          chart_name=$(helm show chart ${INPUTS_CHART_PATH} | grep '^name:' | awk '{print $2}')
          chart_version=$(helm show chart ${INPUTS_CHART_PATH} | grep '^version:' | awk '{print $2}')
          helm push "${chart_name}-${chart_version}.tgz" "oci://${INPUTS_REGISTRY}/${{ github.repository_owner }}/charts"
        env:
          INPUTS_CHART_PATH: ${{ inputs.chart_path }}
          INPUTS_REGISTRY: ${{ inputs.registry }}
