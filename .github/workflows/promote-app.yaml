name: Promote App

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (test, staging, prod)"
        required: true
        type: string
      deployment_type:
        description: "Deployment type (helm or kustomize)"
        required: true
        type: string
      app_name:
        description: "App name in argocd-demo (e.g., demo-frontend, demo-backend)"
        required: true
        type: string
      version:
        description: "Version to promote — chart version for helm, image tag for kustomize"
        required: true
        type: string
      image_name:
        description: "Full image name without tag (required for kustomize, e.g., ghcr.io/recmanj/demo-frontend)"
        required: false
        type: string
        default: ""
      kustomize_app:
        description: "Kustomize app directory name (default: demo-app)"
        required: false
        type: string
        default: "demo-app"
    secrets:
      ARGOCD_REPO_TOKEN:
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [[ "${INPUTS_DEPLOYMENT_TYPE}" == "kustomize" && -z "${INPUTS_IMAGE_NAME}" ]]; then
            echo "Error: image_name is required for kustomize deployments"
            exit 1
          fi
        env:
          INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
          INPUTS_IMAGE_NAME: ${{ inputs.image_name }}

      - name: Checkout argocd-demo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: recmanj/argocd-demo
          token: ${{ secrets.ARGOCD_REPO_TOKEN }} # zizmor: ignore[secrets-outside-env]
          ref: main
          persist-credentials: false

      - name: Update chart version (Helm)
        if: inputs.deployment_type == 'helm'
        run: |
          CONFIG_FILE="apps/apps-helm/${INPUTS_APP_NAME}/envs/${INPUTS_ENVIRONMENT}/config.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: $CONFIG_FILE not found"
            exit 1
          fi
          jq --arg v "${INPUTS_VERSION}" '.version = $v' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
          echo "Updated $CONFIG_FILE:"
          cat "$CONFIG_FILE"
        env:
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Update image tag (Kustomize)
        if: inputs.deployment_type == 'kustomize'
        run: |
          VERSIONS_FILE="apps/apps-kustomize/${INPUTS_KUSTOMIZE_APP}/envs/${INPUTS_ENVIRONMENT}/versions.yaml"
          if [ ! -f "$VERSIONS_FILE" ]; then
            echo "Error: $VERSIONS_FILE not found"
            exit 1
          fi
          yq -i '(select(.metadata.name == strenv(INPUTS_APP_NAME)) | .spec.template.spec.containers[0]).image = strenv(INPUTS_IMAGE_NAME) + ":" + strenv(INPUTS_VERSION)' "$VERSIONS_FILE"
          echo "Updated $VERSIONS_FILE:"
          cat "$VERSIONS_FILE"
        env:
          INPUTS_KUSTOMIZE_APP: ${{ inputs.kustomize_app }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_IMAGE_NAME: ${{ inputs.image_name }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "promote: ${INPUTS_APP_NAME} to ${INPUTS_VERSION} in ${INPUTS_ENVIRONMENT}"
          git push
        env:
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
