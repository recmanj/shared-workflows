name: Promote App

on:
  workflow_call:
    inputs:
      argocd_repository:
        description: "Target ArgoCD repository"
        required: true
        type: string
      environment:
        description: "Target environment (test, staging, prod)"
        required: true
        type: string
      deployment_type:
        description: "Deployment type (helm or kustomize)"
        required: true
        type: string
      app_name:
        description: "App name in argocd-demo (e.g., demo-frontend, demo-backend)"
        required: true
        type: string
      version:
        description: "Version to promote — chart version for helm, image tag for kustomize"
        required: true
        type: string
      image_name:
        description: "Full image name without tag (required for kustomize, e.g., ghcr.io/recmanj/demo-frontend)"
        required: false
        type: string
        default: ""
      app_path:
        description: "Base path to the app's environment configs. Defaults to 'apps/apps-helm' for helm, 'demo-app' for kustomize."
        required: false
        type: string
        default: ""
      automerge_envs:
        description: "Environments for which promotion PRs should be auto-merged. Comma-separated list (no spaces), e.g. 'test,staging'"
        required: false
        type: string
        default: "test"
    secrets:
      ARGOCD_REPO_TOKEN:
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [[ "${INPUTS_DEPLOYMENT_TYPE}" == "kustomize" && -z "${INPUTS_IMAGE_NAME}" ]]; then
            echo "Error: image_name is required for kustomize deployments"
            exit 1
          fi
        env:
          INPUTS_DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
          INPUTS_IMAGE_NAME: ${{ inputs.image_name }}

      - name: Checkout argocd-demo # zizmor: ignore[artipacked]
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.argocd_repository }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }} # zizmor: ignore[secrets-outside-env]
          ref: main

      - name: Update chart version (Helm)
        if: inputs.deployment_type == 'helm'
        run: |
          APP_PATH="${INPUTS_APP_PATH:-apps/apps-helm}"
          CONFIG_FILE="${APP_PATH}/${INPUTS_APP_NAME}/envs/${INPUTS_ENVIRONMENT}/config.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: $CONFIG_FILE not found"
            exit 1
          fi
          jq --arg v "${INPUTS_VERSION}" '.version = $v' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
          echo "Updated $CONFIG_FILE:"
          cat "$CONFIG_FILE"
        env:
          INPUTS_APP_PATH: ${{ inputs.app_path }}
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Update image tag (Kustomize)
        if: inputs.deployment_type == 'kustomize'
        run: |
          APP_PATH="${INPUTS_APP_PATH:-demo-app}"
          VERSIONS_FILE="${APP_PATH}/envs/${INPUTS_ENVIRONMENT}/versions.yaml"
          if [ ! -f "$VERSIONS_FILE" ]; then
            echo "Error: $VERSIONS_FILE not found"
            exit 1
          fi
          yq -i '(select(.metadata.name == strenv(INPUTS_APP_NAME)) | .spec.template.spec.containers[0]).image = strenv(INPUTS_IMAGE_NAME) + ":" + strenv(INPUTS_VERSION)' "$VERSIONS_FILE"
          echo "Updated $VERSIONS_FILE:"
          cat "$VERSIONS_FILE"
        env:
          INPUTS_APP_PATH: ${{ inputs.app_path }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_IMAGE_NAME: ${{ inputs.image_name }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Create git branch
        id: git_branch
        run: |
          safe_app=$(echo "${INPUTS_APP_NAME}" | tr -cs 'a-zA-Z0-9-' '-' | sed 's/-$//')
          safe_version=$(echo "${INPUTS_VERSION}" | tr -cs 'a-zA-Z0-9-' '-' | sed 's/-$//')
          branch_name="bump-${safe_app}-${safe_version}-$(date +%Y-%m-%dT%H-%M-%S)"
          git switch --create "${branch_name}"
          echo "branch_name=${branch_name}" >> $GITHUB_OUTPUT
        env:
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Commit, push and create PR
        id: git_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          git diff --cached --quiet \
            && { echo "No changes to commit"; echo "changes=false" >> $GITHUB_OUTPUT; exit 0; } \
            || echo "changes=true" >> $GITHUB_OUTPUT

          git commit -m "promote: ${INPUTS_APP_NAME} to ${INPUTS_VERSION} in ${INPUTS_ENVIRONMENT}"
          git push --set-upstream origin "${STEPS_GIT_BRANCH_OUTPUTS_BRANCH_NAME}"

          gh pr create --base main --head "${STEPS_GIT_BRANCH_OUTPUTS_BRANCH_NAME}" \
            --title "Promote ${INPUTS_APP_NAME}:${INPUTS_VERSION} to ${INPUTS_ENVIRONMENT}" \
            --body "Automated promotion of **${INPUTS_APP_NAME}** to version \`${INPUTS_VERSION}\` in **${INPUTS_ENVIRONMENT}**."
        env:
          GH_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }} # zizmor: ignore[secrets-outside-env]
          INPUTS_APP_NAME: ${{ inputs.app_name }}
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          STEPS_GIT_BRANCH_OUTPUTS_BRANCH_NAME: ${{ steps.git_branch.outputs.branch_name }}

      - name: Enable auto-merge for PR
        if: steps.git_push.outputs.changes == 'true' && contains(format(',{0},', inputs.automerge_envs), format(',{0},', inputs.environment))
        run: |
          gh pr merge "${STEPS_GIT_BRANCH_OUTPUTS_BRANCH_NAME}" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }} # zizmor: ignore[secrets-outside-env]
          STEPS_GIT_BRANCH_OUTPUTS_BRANCH_NAME: ${{ steps.git_branch.outputs.branch_name }}
